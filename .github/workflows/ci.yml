name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Format check
        run: zig fmt --check src/

      - name: Tiger style lint check
        run: zig run scripts/check_style.zig -- --root src --strict

  portable:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build

      - name: Run tests
        run: zig build test

      - name: Build RFC examples
        shell: bash
        run: |
          set -euo pipefail
          for dir in examples/base64 examples/csv examples/email examples/uri; do
            (
              cd "$dir"
              zig build
            )
          done

      - name: Run RFC specs
        shell: bash
        run: |
          set -euo pipefail
          if [ "${RUNNER_OS}" = "Windows" ]; then
            INDUCT=./zig-out/bin/induct.exe
          else
            INDUCT=./zig-out/bin/induct
          fi
          "$INDUCT" run specs/rfcspec.yaml

  self-specs:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build

      - name: Build RFC examples
        shell: bash
        run: |
          set -euo pipefail
          for dir in examples/base64 examples/csv examples/email examples/uri; do
            (
              cd "$dir"
              zig build
            )
          done

      - name: Run full self-test suite
        shell: bash
        run: ./zig-out/bin/induct run specs/inductspec.yaml
