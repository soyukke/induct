name: RFC 3986 reference resolution
description: |
  RFC 3986 Section 5.4: base URI に対する相対参照の解決。
  Base URI: http://a/b/c/d;p?q

vars:
  URI: ./examples/uri/zig-out/bin/uri${EXEEXT}
  BASE: "http://a/b/c/d;p?q"

test_table:
  command: "${URI}"
  args:
    - resolve
    - "${BASE}"
    - "${ref}"
  cases:
    - name: "g:h"
      ref: "g:h"
      expect_output: "g:h\n"
    - name: "g"
      ref: "g"
      expect_output: "http://a/b/c/g\n"
    - name: "./g"
      ref: "./g"
      expect_output: "http://a/b/c/g\n"
    - name: "g/"
      ref: "g/"
      expect_output: "http://a/b/c/g/\n"
    - name: "/g"
      ref: "/g"
      expect_output: "http://a/g\n"
    - name: "//g"
      ref: "//g"
      expect_output: "http://g\n"
    - name: "?y"
      ref: "?y"
      expect_output: "http://a/b/c/d;p?y\n"
    - name: "g?y"
      ref: "g?y"
      expect_output: "http://a/b/c/g?y\n"
    - name: "#s"
      ref: "#s"
      expect_output: "http://a/b/c/d;p?q#s\n"
    - name: "g#s"
      ref: "g#s"
      expect_output: "http://a/b/c/g#s\n"
    - name: "g?y#s"
      ref: "g?y#s"
      expect_output: "http://a/b/c/g?y#s\n"
    - name: ";x"
      ref: ";x"
      expect_output: "http://a/b/c/;x\n"
    - name: empty
      ref: ""
      expect_output: "http://a/b/c/d;p?q\n"
    - name: "."
      ref: "."
      expect_output: "http://a/b/c/\n"
    - name: "./"
      ref: "./"
      expect_output: "http://a/b/c/\n"
    - name: ".."
      ref: ".."
      expect_output: "http://a/b/\n"
    - name: "../"
      ref: "../"
      expect_output: "http://a/b/\n"
    - name: "../g"
      ref: "../g"
      expect_output: "http://a/b/g\n"
    - name: "../.."
      ref: "../.."
      expect_output: "http://a/\n"
    - name: "../../"
      ref: "../../"
      expect_output: "http://a/\n"
    - name: "../../g"
      ref: "../../g"
      expect_output: "http://a/g\n"
