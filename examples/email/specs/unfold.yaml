name: RFC 5322 header unfolding
description: |
  RFC 5322 Section 2.2.3: Long Header Fields

  各ヘッダフィールドは論理的に1行だが、可読性のために複数行に分割できる。
  CRLF の直後に少なくとも1つの WSP (空白またはタブ) が続く場合、
  その CRLF + WSP は単一の空白に置換される（unfolding）。

  unfold の規則:
  - CRLF + SP → SP
  - CRLF + TAB → SP
  - CRLF + 複数WSP → SP（1つに正規化）
  - CRLF + 非WSP → そのまま（レコード境界）

vars:
  EMAIL: ./examples/email/zig-out/bin/email${EXEEXT}

steps:
  - name: "basic unfolding: CRLF + SP"
    command: "${EMAIL}"
    args:
      - unfold
    input: "Subject: This\r\n is a test"
    expect_output: "Subject: This is a test"

  - name: "CRLF + TAB"
    command: "${EMAIL}"
    args:
      - unfold
    input: "Subject: This\r\n\tis a test"
    expect_output: "Subject: This is a test"

  - name: "multiple folds"
    command: "${EMAIL}"
    args:
      - unfold
    input: "Subject: This\r\n is\r\n a\r\n test"
    expect_output: "Subject: This is a test"

  - name: "no folding (bare CRLF without WSP)"
    command: "${EMAIL}"
    args:
      - unfold
    input: "Header1: value1\r\nHeader2: value2"
    expect_output: "Header1: value1\r\nHeader2: value2"

  - name: "CRLF + multiple spaces normalized to single space"
    command: "${EMAIL}"
    args:
      - unfold
    input: "Subject: This\r\n   is a test"
    expect_output: "Subject: This is a test"

  - name: "empty input"
    command: "${EMAIL}"
    args:
      - unfold
    input: ""
    expect_output: ""
