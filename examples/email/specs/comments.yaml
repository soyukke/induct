name: RFC 5322 comment handling
description: |
  RFC 5322 Section 3.2.2: Folding White Space and Comments

  comment  = "(" *([FWS] ccontent) [FWS] ")"
  ccontent = ctext / quoted-pair / comment

  コメントは括弧 () で囲まれ、ネスト可能。
  quoted-pair (バックスラッシュエスケープ) はコメント内で有効。
  クォート文字列 "" 内のコメント構文は無視される。

vars:
  EMAIL: ./examples/email/zig-out/bin/email${EXEEXT}

steps:
  - name: "simple comment removal"
    command: "${EMAIL}"
    args:
      - strip-comments
    input_lines:
      - 'pete(his account)@silly.test'
    expect_output_contains:
      - "pete"
      - "silly.test"

  - name: "nested comment removal"
    command: "${EMAIL}"
    args:
      - strip-comments
    input_lines:
      - 'a(outer(inner)end)@example.com'
    expect_output_contains:
      - "a"
      - "example.com"

  - name: "comment with quoted-pair"
    command: "${EMAIL}"
    args:
      - strip-comments
    input_lines:
      - 'test(comment with \) paren)@example.com'
    expect_output_contains:
      - "test"
      - "example.com"

  - name: "no comment (passthrough)"
    command: "${EMAIL}"
    args:
      - strip-comments
    input_lines:
      - 'simple@example.com'
    expect_output: "simple@example.com\n"

  - name: "comment preserved inside quoted string"
    command: "${EMAIL}"
    args:
      - strip-comments
    input_lines:
      - '"not(a)comment"@example.com'
    expect_output: "\"not(a)comment\"@example.com\n"

  - name: "multiple comments"
    command: "${EMAIL}"
    args:
      - strip-comments
    input_lines:
      - 'a(one)b(two)@example.com'
    expect_output_contains: "example.com"
