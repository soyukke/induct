repos:
  - repo: local
    hooks:
      - id: zig-fmt-check
        name: zig fmt --check (src)
        entry: zig fmt --check src
        language: system
        pass_filenames: false
        always_run: true

      - id: tiger-style-lint-strict
        name: tiger style lint (strict)
        entry: zig run scripts/check_style.zig -- --root src --strict
        language: system
        pass_filenames: false
        always_run: true
