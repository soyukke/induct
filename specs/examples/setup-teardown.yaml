name: file create and read
description: |
  setup でファイルを作成し、コマンドでその内容を読み取れる。
  teardown で一時ファイルを確実に削除する。

setup:
  - run: echo "test content" > /tmp/induct-test.txt

test:
  command: cat /tmp/induct-test.txt
  expect_output_contains: "test content"
  expect_exit_code: 0

teardown:
  - run: rm -f /tmp/induct-test.txt
