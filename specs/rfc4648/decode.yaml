name: RFC 4648 Base64 decoding
description: |
  RFC 4648 Section 10 test vectors の逆方向。
  Base64 decoder は符号化文字列を元のバイト列に復元する。

vars:
  BASE64: ./examples/base64/zig-out/bin/base64${EXEEXT}

test_table:
  command: "${BASE64}"
  args:
    - decode
  cases:
    - input: ""
      expect_output: ""
    - input: "Zg=="
      expect_output: "f"
    - input: "Zm8="
      expect_output: "fo"
    - input: "Zm9v"
      expect_output: "foo"
    - input: "Zm9vYg=="
      expect_output: "foob"
    - input: "Zm9vYmE="
      expect_output: "fooba"
    - input: "Zm9vYmFy"
      expect_output: "foobar"
