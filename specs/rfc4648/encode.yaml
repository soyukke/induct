name: RFC 4648 Base64 encoding
description: |
  RFC 4648 Section 10 test vectors.
  Base64 encoder は入力バイト列をBase64アルファベットで符号化する。
  パディング(=)は必須。改行は付与しない。

test_table:
  command: "printf '${input}' | ./examples/base64/zig-out/bin/base64 encode"
  cases:
    - input: ""
      expect_output: ""
    - input: f
      expect_output: "Zg=="
    - input: fo
      expect_output: "Zm8="
    - input: foo
      expect_output: "Zm9v"
    - input: foob
      expect_output: "Zm9vYg=="
    - input: fooba
      expect_output: "Zm9vYmE="
    - input: foobar
      expect_output: "Zm9vYmFy"
