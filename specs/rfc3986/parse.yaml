name: RFC 3986 URI parsing
description: |
  RFC 3986 Section 3: URIをscheme, authority, path, query, fragmentに分解する。
  空のコンポーネントは出力しない。

vars:
  URI: ./examples/uri/zig-out/bin/uri

test_table:
  command: "${URI} parse '${input}'"
  cases:
    - name: full URI
      input: "foo://example.com:8042/over/there?name=ferret#nose"
      expect_output: "scheme: foo\nauthority: example.com:8042\npath: /over/there\nquery: name=ferret\nfragment: nose\n"

    - name: URN (no authority)
      input: "urn:example:animal:ferret:nose"
      expect_output: "scheme: urn\npath: example:animal:ferret:nose\n"

    - name: HTTP with path
      input: "http://www.ietf.org/rfc/rfc2396.txt"
      expect_output: "scheme: http\nauthority: www.ietf.org\npath: /rfc/rfc2396.txt\n"

    - name: mailto
      input: "mailto:John.Doe@example.com"
      expect_output: "scheme: mailto\npath: John.Doe@example.com\n"

    - name: tel
      input: "tel:+1-816-555-1212"
      expect_output: "scheme: tel\npath: +1-816-555-1212\n"

    - name: scheme and authority only
      input: "telnet://192.0.2.16:80/"
      expect_output: "scheme: telnet\nauthority: 192.0.2.16:80\npath: /\n"
