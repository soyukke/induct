name: RFC 3986 URI parsing
description: |
  RFC 3986 Section 3: URIをscheme, authority, path, query, fragmentに分解する。
  空のコンポーネントは出力しない。

vars:
  URI: ./examples/uri/zig-out/bin/uri

test_table:
  command: "${URI} parse '${input}'"
  cases:
    - name: full URI
      input: "foo://example.com:8042/over/there?name=ferret#nose"
      expect_output_contains:
        - "scheme: foo"
        - "authority: example.com:8042"
        - "path: /over/there"
        - "query: name=ferret"
        - "fragment: nose"

    - name: URN (no authority)
      input: "urn:example:animal:ferret:nose"
      expect_output_contains:
        - "scheme: urn"
        - "path: example:animal:ferret:nose"
      expect_output_not_contains:
        - "authority:"

    - name: HTTP with path
      input: "http://www.ietf.org/rfc/rfc2396.txt"
      expect_output_contains:
        - "scheme: http"
        - "authority: www.ietf.org"
        - "path: /rfc/rfc2396.txt"

    - name: mailto
      input: "mailto:John.Doe@example.com"
      expect_output_contains:
        - "scheme: mailto"
        - "path: John.Doe@example.com"

    - name: tel
      input: "tel:+1-816-555-1212"
      expect_output_contains:
        - "scheme: tel"
        - "path: +1-816-555-1212"

    - name: scheme and authority only
      input: "telnet://192.0.2.16:80/"
      expect_output_contains:
        - "scheme: telnet"
        - "authority: 192.0.2.16:80"
        - "path: /"
