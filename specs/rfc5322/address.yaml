name: RFC 5322 address parsing
description: |
  RFC 5322 Section 3.4: Address Specification

  address     = mailbox / group
  mailbox     = name-addr / addr-spec
  name-addr   = [display-name] angle-addr
  angle-addr  = "<" addr-spec ">"
  addr-spec   = local-part "@" domain
  group       = display-name ":" [group-list] ";"

  メールアドレスを display-name, local-part, domain に分解する。
  グループ構文は display-name ":" で識別する。

  注: コマンド引数に " を含む文字列を渡すのはシェルエスケープが複雑になるため、
  stdin 経由で入力する。これは Induct の課題でもある（コマンド引数のエスケープ問題）。

vars:
  EMAIL: ./examples/email/zig-out/bin/email

steps:
  # ── bare addr-spec ──
  - name: "bare addr-spec"
    command: "${EMAIL} parse-address"
    input_lines:
      - 'jdoe@example.org'
    expect_output_contains:
      - "local-part: jdoe"
      - "domain: example.org"
    expect_output_not_contains: "display-name:"

  # ── name-addr with display name ──
  - name: "name-addr with quoted display name"
    command: "${EMAIL} parse-address"
    input_lines:
      - '"Joe Q. Public" <john.q.public@example.com>'
    expect_output_contains:
      - "display-name: Joe Q. Public"
      - "local-part: john.q.public"
      - "domain: example.com"

  - name: "name-addr with unquoted display name"
    command: "${EMAIL} parse-address"
    input_lines:
      - 'John Doe <jdoe@example.net>'
    expect_output_contains:
      - "display-name: John Doe"
      - "local-part: jdoe"
      - "domain: example.net"

  - name: "name-addr without display name (angle-addr only)"
    command: "${EMAIL} parse-address"
    input_lines:
      - '<boss@nil.test>'
    expect_output_contains:
      - "local-part: boss"
      - "domain: nil.test"
    expect_output_not_contains: "display-name:"

  # ── group syntax (requires parse-addresses, not parse-address) ──
  - name: "group syntax"
    command: "${EMAIL} parse-addresses"
    input_lines:
      - 'A Group:ed.jones@example.com;'
    expect_output_contains: "group: A Group"
