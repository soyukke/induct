name: induct self-test suite
description: Comprehensive test specifications for the induct CLI tool

# Inline specs for quick sanity checks
specs:
  - name: help command shows usage
    test:
      command: ./zig-out/bin/induct help
      expect_output_contains: "USAGE:"
      expect_exit_code: 0

  - name: version command works
    test:
      command: ./zig-out/bin/induct version
      expect_output_contains: "induct v"
      expect_exit_code: 0

  - name: echo example passes
    test:
      command: ./zig-out/bin/induct run specs/examples/echo.yaml
      expect_output_contains: "[PASS]"
      expect_exit_code: 0

  - name: stdin example passes
    test:
      command: ./zig-out/bin/induct run specs/examples/cat-stdin.yaml
      expect_output_contains: "[PASS]"
      expect_exit_code: 0

  - name: exit code example passes
    test:
      command: ./zig-out/bin/induct run specs/examples/exit-code.yaml
      expect_output_contains: "[PASS]"
      expect_exit_code: 0

  - name: setup-teardown example passes
    test:
      command: ./zig-out/bin/induct run specs/examples/setup-teardown.yaml
      expect_output_contains: "[PASS]"
      expect_exit_code: 0

# Include external spec files for detailed tests
include:
  # CLI command tests
  - cli/help.yaml
  - cli/version.yaml
  - cli/unknown-command.yaml
  - cli/no-args.yaml
  - cli/init.yaml
  - cli/init-file.yaml
  - cli/validate-valid.yaml
  - cli/validate-invalid.yaml
  - cli/schema.yaml

  # Execution tests
  - execution/run-passing-spec.yaml
  - execution/run-failing-spec.yaml
  - execution/run-with-json.yaml
  - execution/run-with-verbose.yaml
  - execution/run-dir.yaml
  - execution/expect-not-contains.yaml
  - execution/expect-regex.yaml
  - execution/expect-stderr.yaml
  - execution/env-vars.yaml
  - execution/working-dir.yaml
  - execution/timeout.yaml
  - execution/run-with-junit.yaml
  - execution/fail-fast.yaml
  - execution/dry-run.yaml
  - execution/filter.yaml
  - execution/parallel.yaml

  # Stderr regex
  - execution/expect-stderr-regex.yaml
  - execution/expect-stderr-regex-fail.yaml

  # Stderr not contains
  - execution/expect-stderr-not-contains.yaml

  # Diff output
  - execution/diff-output.yaml
  - execution/diff-long-output.yaml
  - execution/diff-stderr-header.yaml

  # JSON escaping
  - execution/json-escape.yaml

  # Filter on run
  - execution/run-filter.yaml

  # Parallel ProjectSpec
  - execution/parallel-projectspec.yaml

  # Global timeout
  - execution/global-timeout.yaml

  # List ProjectSpec
  - execution/list-projectspec.yaml

  # Steps tests
  - execution/steps-basic.yaml
  - execution/steps-fail-skips.yaml

  # Test table
  - execution/test-table-basic.yaml
  - execution/test-table-fuzzy.yaml
  - execution/schema-test-table.yaml

  # Error handling tests
  - errors/file-not-found.yaml
  - errors/missing-spec-path.yaml
  - errors/invalid-yaml.yaml
